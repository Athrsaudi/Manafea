<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/logo.jpg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مشروع منافع</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="01ced320-3bf7-4758-b6d4-f84c0f4a493e"></script>
    <style>
      html { font-size: 18px; }
      body, button, input, select, textarea, * {
        font-family: 'Tajawal', 'Segoe UI', sans-serif !important;
      }
    </style>
  
    <style id="splash-style">
      #splash{
        position:fixed;inset:0;background:#1B3A4B;
        display:flex;align-items:center;justify-content:center;
        z-index:9999;transition:opacity .5s ease;
      }
      #splash img{width:180px;height:180px;border-radius:50%;object-fit:cover;box-shadow:0 8px 40px rgba(0,0,0,.4);}
      #splash.hide{opacity:0;pointer-events:none;}
    </style>
  </head>
  <body>
    
  <div id="splash">
    <img src="/logo.jpg" alt="منافع" />
  </div>
  <div id="root"></div>
  <script>
    window.addEventListener('load', function(){
      setTimeout(function(){
        var s = document.getElementById('splash');
        if(s){ s.classList.add('hide'); setTimeout(function(){ s.remove(); }, 600); }
      }, 800);
    });
  </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
